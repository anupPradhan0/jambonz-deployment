# Nixpacks configuration for SBC SIP Sidecar
# Utility running alongside SBC for outbound SIP handling

[build]
# Node.js version
nodeVersion = "18"

[build.env]
# Build-time environment variables
NPM_CONFIG_LOGLEVEL = "warn"

[start]
# Start command for SBC SIP sidecar
cmd = "node app.js"

[env]
# Runtime environment variables
SBC_SIP_SIDECAR_PORT = "5064"
SBC_SIP_SIDECAR_HOST = "0.0.0.0"
JAMBONES_MYSQL_HOST = "mysql"
JAMBONES_MYSQL_PORT = "3306"
JAMBONES_MYSQL_USER = "jambones"
JAMBONES_MYSQL_DATABASE = "jambones"
JAMBONES_REDIS_HOST = "redis"
JAMBONES_REDIS_PORT = "6379"
JAMBONES_LOGLEVEL = "info"
DRACHTIO_HOST = "drachtio"
DRACHTIO_PORT = "9060"
DRACHTIO_SECRET = "cymru"
JAMBONES_FEATURE_SERVER_HOST = "jambonz-feature-server"
JAMBONES_FEATURE_SERVER_PORT = "3100"
JAMBONES_TIME_SERIES_HOST = "prometheus"
JAMBONES_TIME_SERIES_PORT = "9090"
ENABLE_METRICS = "1"

[ports]
# Expose SIP signaling port
5064 = { port = 5064, protocol = "tcp" }

[health]
# Health check configuration
cmd = "curl -f http://localhost:5064/health || exit 1"
startPeriod = 30
interval = 10
timeout = 5
retries = 3
