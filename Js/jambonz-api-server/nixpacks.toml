# Nixpacks configuration for Jambonz API Server
# REST API for managing accounts, carriers, phone numbers, and applications

[build]
# Node.js version
nodeVersion = "18"

[build.env]
# Build-time environment variables
NPM_CONFIG_LOGLEVEL = "warn"

[build.commands]
# Additional build commands if needed
install = "npm install --legacy-peer-deps"

[start]
# Start command for the API server
cmd = "node app.js"

[env]
# Runtime environment variables
NODE_ENV = "production"
API_SERVER_PORT = "3000"
API_SERVER_HOST = "0.0.0.0"
JAMBONES_MYSQL_HOST = "mysql"
JAMBONES_MYSQL_PORT = "3306"
JAMBONES_MYSQL_USER = "jambones"
JAMBONES_MYSQL_DATABASE = "jambones"
JAMBONES_REDIS_HOST = "redis"
JAMBONES_REDIS_PORT = "6379"
JWT_SECRET = "your-super-secret-jwt-key-change-this"
ENCRYPTION_SECRET = "your-encryption-secret-change-this"
JAMBONES_LOGLEVEL = "info"
K8S = "false"
K8S_FEATURE_SERVER_SERVICE_NAME = "jambonz-feature-server"
K8S_FEATURE_SERVER_SERVICE_PORT = "3100"
AWS_REGION = "us-east-1"
JAMBONES_CURRENCY = "USD"

[ports]
# Expose port 3000 for API server
3000 = { port = 3000, protocol = "tcp" }

[health]
# Health check configuration
cmd = "curl -f http://localhost:3000/health || exit 1"
startPeriod = 30
interval = 10
timeout = 5
retries = 3
