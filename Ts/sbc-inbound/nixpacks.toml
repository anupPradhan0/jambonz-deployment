# Nixpacks configuration for SBC Inbound
# Session Border Controller for handling incoming SIP INVITE requests

[build]
# Node.js version
nodeVersion = "18"

[build.env]
# Build-time environment variables
NPM_CONFIG_LOGLEVEL = "warn"

[start]
# Start command for SBC inbound
cmd = "node app.js"

[env]
# Runtime environment variables
SBC_INBOUND_PORT = "5060"
SBC_INBOUND_HOST = "0.0.0.0"
SBC_INBOUND_WS_PORT = "5061"
JAMBONES_MYSQL_HOST = "mysql"
JAMBONES_MYSQL_PORT = "3306"
JAMBONES_MYSQL_USER = "jambones"
JAMBONES_MYSQL_DATABASE = "jambones"
JAMBONES_REDIS_HOST = "redis"
JAMBONES_REDIS_PORT = "6379"
JAMBONES_LOGLEVEL = "info"
DRACHTIO_HOST = "drachtio"
DRACHTIO_PORT = "9060"
DRACHTIO_SECRET = "cymru"
JAMBONES_FEATURE_SERVER_HOST = "jambonz-feature-server"
JAMBONES_FEATURE_SERVER_PORT = "3100"
JAMBONES_TIME_SERIES_HOST = "prometheus"
JAMBONES_TIME_SERIES_PORT = "9090"
ENABLE_METRICS = "1"
JAMBONES_NETWORK_CIDR = "10.0.0.0/8"

[ports]
# Expose SIP signaling ports
5060 = { port = 5060, protocol = "udp" }
5060 = { port = 5060, protocol = "tcp" }
5061 = { port = 5061, protocol = "tcp" }

[health]
# Health check using the liveness script
cmd = "bash liveness.sh"
startPeriod = 30
interval = 10
timeout = 5
retries = 3
